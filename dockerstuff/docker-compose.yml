services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile.open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"
      RAG_EMBEDDING_ENGINE: ollama
      RAG_EMBEDDING_MODEL: nomic-embed-text
    volumes:
      - ./OpenWebUI/tools:/app/backend/data/tools:ro
      - ./SurzsEnviro:/workspace/SurzsEnviro:rw
      - ./dockerstuff:/workspace/dockerstuff
  
  open-terminal:
    build:
      context: .
      dockerfile: Dockerfile.open-terminal
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY}
      OPEN_TERMINAL_PROXY_DOMAIN: ${OPEN_TERMINAL_PROXY_DOMAIN}
      OPEN_TERMINAL_PUBLIC_URL: ${OPEN_TERMINAL_PUBLIC_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./SurzsEnviro:/workspace/SurzsEnviro:rw