services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale-sidecar
    restart: unless-stopped
    environment:
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: --accept-routes --advertise-routes=172.31.250.0/24
      TS_SERVE_CONFIG: /config/serve.json
      TS_AUTHKEY: ${TS_AUTHKEY}
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    networks:
      - desktop-stack

  open-webui:
    build:
      context: .
      dockerfile: Dockerfile.open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"
      CODE_EXECUTION_ENGINE: jupyter
      CODE_EXECUTION_JUPYTER_URL: http://jupyter:8888
      CODE_EXECUTION_JUPYTER_AUTH: token
      CODE_EXECUTION_JUPYTER_AUTH_TOKEN: ${JUPYTER_TOKEN:-Surzal123}
      CODE_INTERPRETER_ENGINE: jupyter
      CODE_INTERPRETER_JUPYTER_URL: http://jupyter:8888
      CODE_INTERPRETER_JUPYTER_AUTH: token
      CODE_INTERPRETER_JUPYTER_AUTH_TOKEN: ${JUPYTER_TOKEN:-Surzal123}
      TERMINAL_SERVER_CONNECTIONS: "[{\"id\":\"open-terminal\",\"name\":\"Open Terminal\",\"enabled\":true,\"url\":\"http://open-terminal:8000\",\"path\":\"/openapi.json\",\"auth_type\":\"bearer\",\"key\":\"${OPEN_TERMINAL_API_KEY:-change-me}\",\"server_type\":\"terminal\"}]"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openwebui-data:/app/backend/data
      - .\Documents\OpenWebUI\tools:/app/backend/data/tools:ro
      - .\Documents\SurzsEnviro:/workspace/Documents/SurzsEnviro:ro
      - ./tailscale-serve.json:/config/serve.json:ro
    networks:
      - desktop-stack
    depends_on:
      tailscale:
        condition: service_started
      open-terminal:
        condition: service_healthy
      jupyter:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  open-terminal:
    build:
      context: .
      dockerfile: Dockerfile.open-terminal
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY:-change-me}
      CORS_ALLOWED_ORIGINS: http://localhost:8080
    volumes:
      - terminal-data:/home/user/.config
      - .:/home/user/workspace
    working_dir: /home/user/workspace
    networks:
      - desktop-stack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-Surzal123}
      JUPYTER_ENABLE_LAB: "no"
    volumes:
      - .:/home/jovyan/workspace
      - jupyter-data:/home/jovyan/.local/share/jupyter
    working_dir: /home/jovyan/workspace
    command:
      - start-notebook.sh
      - --NotebookApp.token=${JUPYTER_TOKEN:-Surzal123}
      - --NotebookApp.password=
      - --NotebookApp.allow_origin=*
      - --NotebookApp.ip=0.0.0.0
      - --NotebookApp.port=8888
      - --NotebookApp.default_url=/tree
      - --NotebookApp.notebook_dir=/home/jovyan/workspace
    networks:
      - desktop-stack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/tree"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  jupyter-data:
  openwebui-data:
  terminal-data:
  tailscale-state:

networks:
  desktop-stack:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.250.0/24
