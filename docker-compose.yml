services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile.open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: https://surzalmessy.taild70ce.ts.net
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"
      RAG_EMBEDDING_ENGINE: ollama
      RAG_EMBEDDING_MODEL: nomic-embed-text
    volumes:
      - openwebui-data:/app/backend/data
      - ./Documents/OpenWebUI/tools:/app/backend/data/tools:ro
      - ./SurzsEnviro:/workspace/Documents/SurzsEnviro:ro

volumes:
  openwebui-data:

networks:
  host-stack:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.250.0/24